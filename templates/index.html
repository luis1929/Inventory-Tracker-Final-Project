<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Inventory Tracker</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Restaurant Inventory Tracker</h1>
        <p class="subtitle">Gestiona tu inventario de cocina y recetas</p>

        <div class="dashboard-cards">
            <a href="/ingredients" class="card">
                <h2>Ingredientes</h2>
                <p>Agrega, actualiza y elimina ingredientes de tu inventario</p>
            </a>
            <a href="/recipes" class="card">
                <h2>Recetas</h2>
                <p>Crea, revisa y verifica recetas contra tu stock</p>
            </a>
        </div>

        <div class="card summary-card">
            <h2>Resumen</h2>
            <div id="summary">
                <p>Cargando...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadSummary() {
            try {
                const [ingsRes, recsRes] = await Promise.all([
                    fetch('/api/ingredients'),
                    fetch('/api/recipes')
                ]);
                const ingredients = await ingsRes.json();
                const recipes = await recsRes.json();

                document.getElementById('summary').innerHTML = `
                    <p><strong>${ingredients.length}</strong> ingredientes en stock</p>
                    <p><strong>${recipes.length}</strong> recetas guardadas</p>
                `;
            } catch (e) {
                document.getElementById('summary').innerHTML = '<p>Error al cargar datos</p>';
            }
        }
        loadSummary();
    </script>
</body>
</html>
