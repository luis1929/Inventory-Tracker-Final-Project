<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - KitchenMaster</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark) 0%, #1a1a2e 100%);
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-card h1 { font-family: 'Playfair Display', serif; text-align: center; margin-bottom: 4px; }
        .auth-card .subtitle { text-align: center; color: var(--text-light); margin-bottom: 24px; }
        .auth-card .brand { text-align: center; font-size: 1.2em; margin-bottom: 20px; color: var(--primary); font-weight: 700; }
        .auth-card .brand span { color: var(--dark); }
        .auth-card label { display: block; font-size: 0.9em; font-weight: 600; margin-bottom: 4px; color: var(--dark); }
        .auth-card input { width: 100%; padding: 12px 14px; border: 2px solid var(--cream-dark); border-radius: var(--radius-sm); font-size: 1em; margin-bottom: 16px; box-sizing: border-box; transition: border-color 0.2s; }
        .auth-card input:focus { outline: none; border-color: var(--primary); }
        .auth-card button { width: 100%; padding: 12px; font-size: 1em; font-weight: 600; margin-top: 4px; }
        .auth-card .message { padding: 12px; border-radius: var(--radius-sm); margin-bottom: 16px; font-size: 0.9em; display: none; }
        .auth-card .message.error { display: block; background: #fadbd8; color: #922b21; }
        .auth-card .message.success { display: block; background: #d5f5e3; color: #1a7a3a; }
        .auth-card .password-strength { height: 4px; background: #eee; border-radius: 2px; margin: -12px 0 16px; overflow: hidden; }
        .auth-card .password-strength div { height: 100%; width: 0; border-radius: 2px; transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand">&#127860; <span>K</span>itchen<span>M</span>aster</div>
            <h1>Nueva Contraseña</h1>
            <p class="subtitle" id="statusText">Verificando enlace...</p>
            <div id="message" class="message"></div>
            <form id="resetForm" style="display:none;">
                <label for="password">Nueva contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" required autocomplete="new-password" minlength="6" oninput="checkStrength(this)">
                <div class="password-strength"><div id="strengthBar"></div></div>
                <button type="submit">&#128274; Cambiar Contraseña</button>
            </form>
        </div>
    </div>
    <script>
        function getParamsFromHash() {
            const hash = window.location.hash.substring(1);
            const params = {};
            hash.split('&').forEach(p => {
                const [k, v] = p.split('=');
                if (k) params[k] = decodeURIComponent(v || '');
            });
            return params;
        }

        function checkStrength(input) {
            const val = input.value;
            const bar = document.getElementById('strengthBar');
            let pct = 0;
            let color = '#e74c3c';
            if (val.length >= 6) { pct = 25; color = '#e67e22'; }
            if (val.length >= 8) { pct = 50; color = '#f1c40f'; }
            if (val.length >= 10) { pct = 75; color = '#27ae60'; }
            if (val.length >= 12) { pct = 100; color = '#1a7a3a'; }
            bar.style.width = pct + '%';
            bar.style.background = color;
        }

        const params = getParamsFromHash();
        const token = params.access_token || params.token;
        const type = params.type;

        if (token && type === 'recovery') {
            document.getElementById('statusText').textContent = 'Ingresa tu nueva contraseña';
            document.getElementById('resetForm').style.display = 'block';
        } else if (token) {
            document.getElementById('statusText').textContent = 'Ingresa tu nueva contraseña';
            document.getElementById('resetForm').style.display = 'block';
        } else {
            document.getElementById('statusText').innerHTML = 'Enlace inválido o expirado. <a href="/forgot-password" style="color:var(--primary);">Solicita uno nuevo</a>.';
        }

        document.getElementById('resetForm').onsubmit = async function(e) {
            e.preventDefault();
            const msg = document.getElementById('message');
            msg.style.display = 'none';
            const btn = this.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Cambiando...';
            try {
                const res = await fetch('/api/auth/update-password', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: document.getElementById('password').value, token: token}),
                });
                const data = await res.json();
                if (res.ok) {
                    msg.className = 'message success';
                    msg.textContent = data.message || 'Contraseña actualizada.';
                    msg.style.display = 'block';
                    btn.textContent = '&#9989; Listo';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    msg.className = 'message error';
                    msg.textContent = data.error || 'Error';
                    msg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = '&#128274; Cambiar Contraseña';
                }
            } catch(e) {
                msg.className = 'message error';
                msg.textContent = 'Error de conexión';
                msg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '&#128274; Cambiar Contraseña';
            }
        };
    </script>
</body>
</html>
