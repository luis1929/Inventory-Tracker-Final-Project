<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - KitchenMaster</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark) 0%, #1a1a2e 100%);
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-card h1 {
            font-family: 'PlayFair Display', serif;
            text-align: center;
            margin-bottom: 4px;
        }
        .auth-card .subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 24px;
        }
        .auth-card .brand {
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 20px;
            color: var(--primary);
            font-weight: 700;
        }
        .auth-card .brand span { color: var(--dark); }
        .auth-card label {
            display: block;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--dark);
        }
        .auth-card input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--cream-dark);
            border-radius: var(--radius-sm);
            font-size: 1em;
            margin-bottom: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .auth-card input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .auth-card button {
            width: 100%;
            padding: 12px;
            font-size: 1em;
            font-weight: 600;
            margin-top: 4px;
        }
        .auth-card .link {
            text-align: center;
            margin-top: 16px;
            font-size: 0.9em;
            color: var(--text-light);
        }
        .auth-card .link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-card .link a:hover { text-decoration: underline; }
        .auth-card .message {
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            font-size: 0.9em;
            display: none;
        }
        .auth-card .message.error { display: block; background: #fadbd8; color: #922b21; }
        .auth-card .message.success { display: block; background: #d5f5e3; color: #1a7a3a; }
        .auth-card .message.info { display: block; background: #d6eaf8; color: #1a5276; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand">&#127860; <span>K</span>itchen<span>M</span>aster</div>
            <h1>Crear Cuenta</h1>
            <p class="subtitle">Regístrate para controlar tu inventario</p>
            <div id="message" class="message"></div>
            <form id="registerForm">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="chef@restaurante.com" required autocomplete="email">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" required autocomplete="new-password" minlength="6">
                <button type="submit">&#127919; Crear Cuenta</button>
            </form>
            <div class="link">
                ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').onsubmit = async function(e) {
            e.preventDefault();
            const msg = document.getElementById('message');
            msg.style.display = 'none';
            const btn = this.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Creando cuenta...';
            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email: document.getElementById('email').value, password: document.getElementById('password').value}),
                });
                const data = await res.json();
                if (res.ok) {
                    if (data.confirmation_sent) {
                        msg.className = 'message info';
                        msg.textContent = 'Revisa tu email para confirmar la cuenta. Si no confirmas, puedes usar la app en modo demo.';
                    } else {
                        msg.className = 'message success';
                        msg.textContent = '¡Cuenta creada! Redirigiendo...';
                        setTimeout(() => window.location.href = '/', 800);
                    }
                    msg.style.display = 'block';
                } else {
                    msg.className = 'message error';
                    msg.textContent = data.error || 'Error al registrarse';
                    msg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = '&#127919; Crear Cuenta';
                }
            } catch(e) {
                msg.className = 'message error';
                msg.textContent = 'Error de conexión';
                msg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '&#127919; Crear Cuenta';
            }
        };
    </script>
</body>
</html>
